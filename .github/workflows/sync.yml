name: Sync Mental Map

on:
  schedule:
    - cron: "0 6 * * *"       # daily at 06:00 UTC
  repository_dispatch:
    types: [openab-push]        # triggered by openab/beta webhook (see setup below)
  workflow_dispatch:             # manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout openab-map
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      - name: Checkout openab/beta
        uses: actions/checkout@v4
        with:
          repository: openabdev/openab
          ref: beta
          path: openab-source
          token: ${{ secrets.GH_PAT }}

      - name: Check for new commits
        id: diff_check
        run: |
          LAST_SHA=$(cat .sync-state | tr -d '[:space:]')
          CURRENT_SHA=$(cd openab-source && git rev-parse HEAD)
          echo "last_sha=$LAST_SHA" >> $GITHUB_OUTPUT
          echo "current_sha=$CURRENT_SHA" >> $GITHUB_OUTPUT

          if [ "$LAST_SHA" = "$CURRENT_SHA" ]; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No new commits since last sync ($LAST_SHA)"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "New commits: $LAST_SHA → $CURRENT_SHA"
          fi

      - name: Generate diff
        if: steps.diff_check.outputs.has_changes == 'true'
        id: generate_diff
        run: |
          cd openab-source
          LAST_SHA="${{ steps.diff_check.outputs.last_sha }}"
          CURRENT_SHA="${{ steps.diff_check.outputs.current_sha }}"

          # Get commit log
          git log --oneline "$LAST_SHA..$CURRENT_SHA" > /tmp/commits.txt
          cat /tmp/commits.txt

          # Get file-level diff summary (no content for large diffs)
          git diff --stat "$LAST_SHA..$CURRENT_SHA" > /tmp/diff_stat.txt

          # Get content diff (capped at 100KB to stay within LLM context)
          git diff "$LAST_SHA..$CURRENT_SHA" \
            -- '*.md' '*.toml' '*.rs' '*.yaml' '*.yml' \
            | head -c 100000 > /tmp/diff_content.txt

          echo "diff_size=$(wc -c < /tmp/diff_content.txt)" >> $GITHUB_OUTPUT

      - name: Set up Python
        if: steps.diff_check.outputs.has_changes == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        if: steps.diff_check.outputs.has_changes == 'true'
        run: pip install anthropic

      - name: Run agent to update map
        if: steps.diff_check.outputs.has_changes == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LAST_SHA: ${{ steps.diff_check.outputs.last_sha }}
          CURRENT_SHA: ${{ steps.diff_check.outputs.current_sha }}
        run: python .github/scripts/update_map.py

      - name: Update sync state
        if: steps.diff_check.outputs.has_changes == 'true'
        run: echo "${{ steps.diff_check.outputs.current_sha }}" > .sync-state

      - name: Create PR
        if: steps.diff_check.outputs.has_changes == 'true'
        id: create_pr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GH_PAT }}
          commit-message: "chore(sync): update map to openab@${{ steps.diff_check.outputs.current_sha }}"
          branch: "sync/openab-${{ steps.diff_check.outputs.current_sha }}"
          title: "Map sync: openab/beta ${{ steps.diff_check.outputs.last_sha }}→${{ steps.diff_check.outputs.current_sha }}"
          body: |
            ## Automated Map Update

            Synced from `openabdev/openab` beta branch.

            **Source range:** `${{ steps.diff_check.outputs.last_sha }}` → `${{ steps.diff_check.outputs.current_sha }}`

            **Commits:**
            $(cat /tmp/commits.txt)

            **Files changed in source:**
            $(cat /tmp/diff_stat.txt)

            ---
            *Generated by the sync workflow. Review for accuracy before merging.*
            *Multi-agent review: tag `@ReviewBot` and `@ValidatorBot` in a comment below.*

            <!-- AUTO_MERGE_ELIGIBLE -->
          delete-branch: true

      # ── Multi-agent review stub ───────────────────────────────────────────
      # TODO: wire this to openab b2b when the review bots are deployed.
      # For now: auto-merge after 2 hours if no human changes were requested.
      #
      # Future shape:
      #   1. Post PR URL to Discord review channel via openab webhook
      #   2. ReviewBot and ValidatorBot read the diff, post LGTM/CHANGES_REQUESTED
      #   3. This workflow listens for the review outcome via repository_dispatch
      #   4. Auto-merge on 2x LGTM
      #
      - name: Post PR to review channel (stub)
        if: steps.create_pr.outputs.pull-request-number != ''
        run: |
          echo "PR #${{ steps.create_pr.outputs.pull-request-number }} created"
          echo "TODO: post to openab review channel for b2b review"
          echo "PR URL: ${{ steps.create_pr.outputs.pull-request-url }}"

      - name: Auto-merge after delay
        if: steps.create_pr.outputs.pull-request-number != ''
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_PAT }}
          script: |
            // Enable auto-merge — merges when all required checks pass
            // Once b2b review is wired, replace with review-gated merge
            await github.rest.pulls.merge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: ${{ steps.create_pr.outputs.pull-request-number }},
              merge_method: 'squash',
              commit_title: 'chore(sync): update map to openab@${{ steps.diff_check.outputs.current_sha }}',
            }).catch(err => {
              // PR may not be ready yet — that's OK, manual merge is the fallback
              console.log('Auto-merge not available yet:', err.message)
            })
